global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'pgbouncer-primary'
    static_configs:
      - targets: ['pgbouncer-exporter-primary:9127']
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: 'pgbouncer-secondary'
    static_configs:
      - targets: ['pgbouncer-exporter-secondary:9127']
    scrape_interval: 5s
    metrics_path: /metrics

  - job_name: 'pgbouncer-tertiary'
    static_configs:
      - targets: ['pgbouncer-exporter-tertiary:9127']
    scrape_interval: 5s
    metrics_path: /metrics