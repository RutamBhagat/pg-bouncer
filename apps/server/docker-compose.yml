name: pg-bouncer

services:
  postgres:
    image: postgres
    container_name: pg-bouncer-postgres
    environment:
      POSTGRES_DB: pg-bouncer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg-bouncer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg-bouncer_postgres_data: